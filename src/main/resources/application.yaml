spring:
  application:
    name: community

  # H2 데이터베이스(인메모리) 설정
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 및 Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: create # 애플리케이션 실행 시 기존 테이블 삭제 후 DDL 자동 생성
    show-sql: true # 콘솔에 SQL 쿼리 출력
    properties:
      hibernate:
        format_sql: true # 쿼리를 보기 좋게 들여쓰기 정렬
        highlight_sql: true # 쿼리에 색상 하이라이트 적용
        use_sql_comments: true # 쿼리 생성 이유(주석) 출력